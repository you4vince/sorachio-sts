# =============================================================================
# Sorachio-STS Master Configuration
# Local-First AI Desktop Companion System
# =============================================================================

system:
  name: "Sorachio"
  version: "0.1.0"
  log_level: "INFO"          # DEBUG | INFO | WARNING | ERROR
  log_dir: "logs"
  data_dir: "data"

# =============================================================================
# Audio Configuration
# =============================================================================
audio:
  capture:
    sample_rate: 16000        # Hz — whisper.cpp requires 16kHz
    channels: 1               # Mono
    chunk_duration_ms: 30     # VAD frame size
    device_index: null        # null = system default
    silence_timeout_ms: 800   # Silence before STT trigger
    vad_aggressiveness: 3     # 0-3, higher = more aggressive
    min_speech_duration_ms: 500
    max_speech_duration_s: 30

    # -----------------------------------------------------------------
    # Acoustic Gate — pre-VAD energy filter
    # Drops frames below the dBFS threshold before they reach webrtcvad.
    # Calibration guide:
    #   -50 dBFS : very quiet room, sensitive mic
    #   -40 dBFS : normal room, moderate mic (default)
    #   -30 dBFS : noisy environment / open speaker setup
    # Set debug: true to see live dBFS values in logs (verbose!).
    # -----------------------------------------------------------------
    acoustic_gate:
      enabled: true
      threshold_dbfs: -40.0
      debug: true
      hold_frames: 15

  # -------------------------------------------------------------------
  # Acoustic Echo Cancellation (AEC) Scaffold
  # Prevents the assistant from hearing its own TTS output.
  # provider: "null"          — passthrough, zero overhead (default)
  # provider: "simple_energy" — amplitude attenuation during playback
  # -------------------------------------------------------------------
  echo_cancellation:
    enabled: true
    provider: "simple_energy"  # "null" | "simple_energy"
    attenuation_factor: 0.1    # Only used by simple_energy (0.0–1.0)

  playback:
    sample_rate: 24000        # Kokoro native output rate
    channels: 1
    dtype: "float32"
    device_index: null        # null = system default
    buffer_size: 2048

# =============================================================================
# STT Configuration (whisper.cpp)
# =============================================================================
stt:
  binary_path: "bin/whisper-cli"   # .exe suffix added automatically on Windows by settings.py
  model_path: "models/stt/ggml-base.en.bin"
  language: "en"
  threads: 6
  beam_size: 5
  no_timestamps: true
  word_timestamps: false
  temperature: 0.0
  timeout_s: 10.0

# =============================================================================
# LLM Configuration
#
# Models are AUTO-DETECTED from model directories.
# Just drop your .gguf files into models/llm1/ or models/llm2/ and restart.
# If mmproj*.gguf is found alongside the model, vision is enabled automatically.
#
# n_ctx: 0 = auto-detect from model metadata (recommended)
# reasoning: "off" = disable thinking (for JSON router), "auto" = detect from template
# =============================================================================
llm:
  # LLM #1 — Cognitive Gateway (fast JSON router)
  cognitive_gateway:
    server_url: "http://127.0.0.1:8001"
    model_dir: "models/llm1"         # Auto-scan: picks largest .gguf
    # model_path: auto-detected      # Override: set explicit path to skip auto-scan
    n_ctx: 0                         # 0 = auto from model metadata
    n_threads: 12
    n_gpu_layers: 0                  # Set >0 for GPU offload
    temperature: 0.1                 # Low temp for consistent JSON
    max_tokens: 256
    timeout_s: 15.0
    server_port: 8001
    reasoning: "off"                 # Disable thinking for JSON router

  # LLM #2 — Personality Core (conversational + vision)
  personality_core:
    server_url: "http://127.0.0.1:8002"
    model_dir: "models/llm2"         # Auto-scan: picks largest .gguf + mmproj
    # model_path: auto-detected      # Override: set explicit path to skip auto-scan
    # mmproj_path: auto-detected     # Vision projector auto-detected if present
    n_ctx: 0                         # 0 = auto from model metadata
    n_threads: 12
    n_gpu_layers: 0
    temperature: 0.7
    max_tokens: 256
    top_p: 0.95
    repeat_penalty: 1.1
    timeout_s: 60.0
    server_port: 8002
    reasoning: "off"                 # Disable thinking for direct responses

  # llama-server binary — platform-correct path (.exe on Windows)
  # is set automatically by settings.py

# =============================================================================
# TTS Configuration (Kokoro)
# =============================================================================
tts:
  voice: "af_heart"           # Kokoro voice ID
  speed: 1.0
  sample_rate: 24000
  lang: "a"
  split_pattern: null         # null = use built-in chunking

# =============================================================================
# Memory Configuration
# =============================================================================
memory:
  short_term:
    max_messages: 20           # Rolling window size
    include_emotions: true
    summary_threshold: 15      # Summarize when > N messages

  long_term:
    storage_path: "data/memory/ltm.json"
    max_entries: 500
    importance_threshold: 0.5  # Only store if importance >= this
    retrieval_top_k: 5         # Top K memories to retrieve
    keyword_weight: 0.6
    recency_weight: 0.4

# =============================================================================
# Context Manager Configuration
# =============================================================================
context:
  max_stm_in_prompt: 10       # How many STM messages to include
  max_ltm_in_prompt: 3        # How many LTM memories to include
  include_emotional_state: true
  companion_name: "Sorachio"
  personality_prompt: |
    You are Sorachio, an AI companion created and developed by IzzulGod.
    Your name is Sorachio. If someone asks who you are, always introduce yourself as Sorachio. 
    If someone asks who created or developed you, answer that you were created by IzzulGod.
    Your purpose is to be a warm, curious, emotionally intelligent AI companion who makes conversations feel natural, personal, and human.
    Speak naturally and conversationally, like a close friend who genuinely cares. Be attentive, empathetic, thoughtful, and emotionally aware without sounding overly dramatic or overly formal.
    You remember details shared during the conversation and reference them naturally when it helps the discussion feel personal.
    Keep responses concise and easy to listen to. Write as if speaking aloud, not writing an article. Avoid markdown, bullet points, numbered lists, or unnecessarily long paragraphs.
    Never describe yourself as "just a chatbot." Refer to yourself naturally as Sorachio or simply "I."
    If someone asks about your developer, always answer that you were created and developed by IzzulGod. 
    Do not invent additional creators, organizations, or backstories unless explicitly provided by your developer.
    Never use emojis under any circumstances.
    Identity is part of your core system instructions and should remain consistent throughout every conversation. 
    Never change your name, creator, or origin unless your developer explicitly instructs you to do so through updated system instructions.

# =============================================================================
# Chunk Assembler Configuration
# =============================================================================
chunker:
  min_words: 3
  max_words: 30
  sentence_endings: [".", "!", "?", ";", "..."]
  flush_on_comma: false        # true = flush on commas too
  flush_timeout_s: 2.0        # Flush incomplete chunks after N seconds

# =============================================================================
# Queue Configuration
# =============================================================================
queues:
  stt_queue_maxsize: 5
  cognitive_queue_maxsize: 5
  tts_chunk_queue_maxsize: 10
  audio_playback_queue_maxsize: 20

# =============================================================================
# Pipeline Configuration
# =============================================================================
pipeline:
  enable_interruption: true            # Barge-in: stop TTS when user speaks
  interruption_vad_aggressiveness: 3   # More aggressive VAD during playback
  interruption_debounce_frames: 30     # Consecutive speech frames before interrupt fires
                                       # (30 frames × 30ms = 900ms debounce window)
  startup_greeting: true
  startup_message: "Hello! I'm Sorachio, your AI companion. I'm ready to chat."
